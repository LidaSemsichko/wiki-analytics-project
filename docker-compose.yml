version: "3.9"

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: wiki-cluster
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./cassandra/init.cql:/init.cql

  spark-master:
    image: apache/spark:3.5.1-python3
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./streaming:/opt/spark/app/streaming
      - ./batch:/opt/spark/app/batch

  spark-worker:
    image: apache/spark:3.5.1-python3
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./streaming:/opt/spark/app/streaming
      - ./batch:/opt/spark/app/batch

  ingestion:
    build: ./ingestion
    container_name: ingestion
    depends_on:
      - kafka
    restart: unless-stopped

  api:
    build: ./api
    container_name: api
    depends_on:
      - cassandra
    ports:
      - "8000:8000"
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: dashboard
    depends_on:
      - api
    ports:
      - "8501:8501"
    restart: unless-stopped

volumes:
  cassandra_data: